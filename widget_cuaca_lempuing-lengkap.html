<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Cuaca Lempuing</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    color:white;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(180deg,#5c7c8a,#2b3f4a);
}

/* HUJAN MIRING */
.rain{
    position:absolute;
    width:2px;
    height:18px;
    background:rgba(255,255,255,.6);
    transform:rotate(20deg);
    animation:rainFall linear infinite;
}
@keyframes rainFall{
    from{transform:translateY(-200px) rotate(20deg);}
    to{transform:translateY(100vh) rotate(20deg);}
}

/* SLEET (butiran es) */
.sleet{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:white;
    opacity:.9;
    animation:snow 6s linear infinite;
}
@keyframes snow{
    from{transform:translateY(-100px)}
    to{transform:translateY(100vh)}
}

/* AWAN */
.cloud{
    position:absolute;
    top:120px;
    left:55%;
    width:320px;
    height:120px;
    background:#fff;
    border-radius:80px;
    filter:blur(1px);
    opacity:.95;
}
.cloud:before,.cloud:after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}
.cloud:before{
    width:150px;height:150px;
    top:-70px;left:40px;
}
.cloud:after{
    width:110px;height:110px;
    top:-50px;left:160px;
}

/* PETIR */
.lightning{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    animation:flash 8s infinite;
}
@keyframes flash{
    0%,96%,100%{opacity:0}
    97%{opacity:.8}
    98%{opacity:0}
}

/* TEKS */
.location{
    position:absolute;
    top:20px;
    left:35px;
    font-size:24px;
    opacity:.9;
}

.time{
    position:absolute;
    top:80px;
    left:35px;
    font-size:80px;
    font-weight:200;
}

.date{
    position:absolute;
    top:170px;
    left:35px;
    font-size:24px;
    opacity:.8;
}

.temp{
    position:absolute;
    top:220px;
    left:35px;
    font-size:48px;
}

.desc{
    position:absolute;
    top:270px;
    left:35px;
    font-size:24px;
    opacity:.9;
}

/* FORECAST BAWAH */
.forecast{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(8px);
    display:flex;
    justify-content:space-around;
    align-items:center;
    font-size:20px;
}

.day{
    text-align:center;
}
.day span{
    display:block;
    margin-top:10px;
    font-size:18px;
    opacity:.9;
}
</style>
</head>

<body>

<div class="lightning"></div>
<div class="cloud"></div>

<div class="location">📍 Lempuing, Ogan Komering Ilir</div>
<div class="time" id="clock"></div>
<div class="date" id="date"></div>
<div class="temp" id="temp">--°C</div>
<div class="desc" id="desc">Memuat...</div>

<div class="forecast">
  <div class="day">WED 🌤️<span>32°/24°</span></div>
  <div class="day">THU 🌧️<span>31°/24°</span></div>
  <div class="day">FRI ⛈️<span>29°/23°</span></div>
  <div class="day">SAT 🌧️<span>30°/24°</span></div>
</div>

<script>
/* JAM & TANGGAL */
function updateTime(){
 const now=new Date();
 document.getElementById("clock").innerHTML=
 now.toLocaleTimeString("id-ID",{hour:'2-digit',minute:'2-digit'});

 document.getElementById("date").innerHTML=
 now.toLocaleDateString("id-ID",{weekday:'short',day:'numeric',month:'short'});
}
setInterval(updateTime,1000);
updateTime();

/* KOORDINAT LEMPUING OKI */
const lat=-3.560;
const lon=105.115;

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
.then(r=>r.json())
.then(d=>{
 const t=d.current_weather.temperature;
 const code=d.current_weather.weathercode;

 document.getElementById("temp").innerHTML=t+"°C";

 let desc="Cerah";
 let rain=false;

 if(code>=51){desc="Gerimis";rain=true;}
 if(code>=80){desc="Hujan";rain=true;}
 if(code>=95){desc="Badai Petir";rain=true;}

 document.getElementById("desc").innerHTML=desc;

 if(rain){
   for(let i=0;i<150;i++){
     const r=document.createElement("div");
     r.className="rain";
     r.style.left=Math.random()*window.innerWidth+"px";
     r.style.animationDuration=(.5+Math.random())+"s";
     document.body.appendChild(r);
   }
 }

 /* sleet effect */
 for(let i=0;i<25;i++){
     const s=document.createElement("div");
     s.className="sleet";
     s.style.left=Math.random()*window.innerWidth+"px";
     s.style.animationDuration=(4+Math.random()*4)+"s";
     document.body.appendChild(s);
 }
});
</script>

</body>
</html>
